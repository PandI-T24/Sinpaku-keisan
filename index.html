<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カルボーネン法 計算ドリル (W記述モード)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        .mode-select {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .mode-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-weight: bold;
            text-align: left;
        }
        .mode-btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
        .game-area {
            display: none;
        }
        .question {
            font-size: 18px;
            font-weight: bold;
            background-color: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #3498db;
            margin-bottom: 20px;
            text-align: left;
            line-height: 1.6;
        }
        .question span {
            color: #e74c3c;
        }
        .input-row {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }
        input[type="number"] {
            width: 120px;
            padding: 10px;
            font-size: 18px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
        }
        .unit {
            font-size: 18px;
            font-weight: bold;
        }
        .action-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .action-btn:hover {
            background-color: #27ae60;
        }
        #next-btn {
            background-color: #3498db;
        }
        #next-btn:hover {
            background-color: #2980b9;
        }
        #back-btn {
            background-color: #95a5a6;
            margin-top: 15px;
        }
        #back-btn:hover {
            background-color: #7f8c8d;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
            text-align: left;
        }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .explanation {
            font-size: 14px;
            font-weight: normal;
            margin-top: 10px;
            color: #555;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="main-title">カルボーネン法 計算ドリル</h1>
    
    <div id="mode-selection" class="mode-select">
        <p style="text-align: left; margin: 0 0 10px 0; color: #666; font-size: 14px;">解きたい計算パターンを選んでください：</p>
        <button class="mode-btn" onclick="startGame(1)">
            ① 目標心拍数を求めるモード<br>
            <span style="font-size: 12px; font-weight: normal; opacity: 0.9;">年齢・安静時・強度(%) から目標の心拍数を計算して入力。</span>
        </button>
        <button class="mode-btn" onclick="startGame(2)">
            ② 現在の運動強度(％)を求めるモード<br>
            <span style="font-size: 12px; font-weight: normal; opacity: 0.9;">年齢・安静時・現心拍数 から、現在の強度(%)を計算して入力。</span>
        </button>
    </div>

    <div id="game-area" class="game-area">
        <div class="question" id="question-text">
            問題がここに表示されます。
        </div>

        <div class="input-row">
            <input type="number" id="user-answer" placeholder="半角数字">
            <span id="unit-text" class="unit">拍/分</span>
        </div>

        <button id="submit-btn" class="action-btn" onclick="checkAnswer()">答え合わせ</button>
        <button id="next-btn" class="action-btn" onclick="generateQuestion()" style="display: none;">次の問題へ</button>
        <button id="back-btn" class="action-btn" onclick="showMenu()">メニューに戻る</button>

        <div id="result-box" class="result"></div>
    </div>
</div>

<script>
    let currentMode = 1; 
    let currentAge, currentRestHr, currentIntensity, currentActiveHr, correctAns;

    function getRandom(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function startGame(mode) {
        currentMode = mode;
        document.getElementById("mode-selection").style.display = "none";
        document.getElementById("game-area").style.display = "block";
        
        if (currentMode === 1) {
            document.getElementById("main-title").innerText = "目標心拍数を求めるドリル";
            document.getElementById("unit-text").innerText = "拍/分";
        } else {
            document.getElementById("main-title").innerText = "現在の運動強度(％)ドリル";
            document.getElementById("unit-text").innerText = "％";
        }
        generateQuestion();
    }

    function showMenu() {
        document.getElementById("game-area").style.display = "none";
        document.getElementById("mode-selection").style.display = "block";
        document.getElementById("main-title").innerText = "カルボーネン法 計算ドリル";
    }

    function generateQuestion() {
        currentAge = getRandom(15, 65);
        currentRestHr = getRandom(55, 85);
        const maxHr = 220 - currentAge;
        const reserveHr = maxHr - currentRestHr;

        // UIリセット
        document.getElementById("user-answer").value = "";
        document.getElementById("user-answer").disabled = false;
        document.getElementById("submit-btn").style.display = "block";
        document.getElementById("next-btn").style.display = "none";

        const resultBox = document.getElementById("result-box");
        resultBox.style.display = "none";
        resultBox.className = "result";

        if (currentMode === 1) {
            // モード1: 目標心拍数を当てる
            currentIntensity = getRandom(4, 8) * 10; // 40%〜80%
            const targetHrRaw = (reserveHr * (currentIntensity / 100)) + currentRestHr;
            correctAns = Math.round(targetHrRaw);

            document.getElementById("question-text").innerHTML = 
                `年齢： <strong>${currentAge} 歳</strong><br>` +
                `安静時心拍数： <strong>${currentRestHr} 拍/分</strong><br>` +
                `目標の運動強度： <strong>${currentIntensity} ％</strong><br><br>` +
                `この場合の<span>目標心拍数</span>は？（四捨五入）`;
        } else {
            // モード2: 現在の強度(%)を当てる
            // きれいな整数パーセントになる現在心拍数を逆算生成
            const randomPercent = getRandom(30, 85);
            currentActiveHr = Math.round((reserveHr * (randomPercent / 100)) + currentRestHr);
            
            // 実際のパーセントを逆算して正解にする
            const actualPct = Math.round(((currentActiveHr - currentRestHr) / reserveHr) * 100);
            correctAns = actualPct;

            document.getElementById("question-text").innerHTML = 
                `年齢： <strong>${currentAge} 歳</strong><br>` +
                `安静時心拍数： <strong>${currentRestHr} 拍/分</strong><br>` +
                `現在の心拍数： <strong>${currentActiveHr} 拍/分</strong><br><br>` +
                `この場合の<span>現在の運動強度（％）</span>は？（四捨五入）`;
        }
    }

    function checkAnswer() {
        const userAnsInput = document.getElementById("user-answer").value;
        if (userAnsInput === "") { alert("数値を入力してください！"); return; }
        const userAns = parseInt(userAnsInput, 10);

        const resultBox = document.getElementById("result-box");
        document.getElementById("user-answer").disabled = true;
        document.getElementById("submit-btn").style.display = "none";
        document.getElementById("next-btn").style.display = "block";

        const maxHr = 220 - currentAge;
        const reserveHr = maxHr - currentRestHr;
        let exp = `<div class="explanation"><strong>【解説】</strong><br>`;

        if (currentMode === 1) {
            const intensityDecimal = currentIntensity / 100;
            exp += `1. 最高心拍数： 220 - ${currentAge} = ${maxHr}<br>` +
                   `2. 予備心拍数： ${maxHr} - ${currentRestHr} = ${reserveHr}<br>` +
                   `3. 計算： (${reserveHr} × ${intensityDecimal}) + ${currentRestHr} = ${(reserveHr * intensityDecimal) + currentRestHr}<br>` +
                   `4. 四捨五入して <strong>${correctAns} 拍/分</strong></div>`;
        } else {
            const activeDiff = currentActiveHr - currentRestHr;
            exp += `1. 最高心拍数： 220 - ${currentAge} = ${maxHr}<br>` +
                   `2. 予備心拍数： ${maxHr} - ${currentRestHr} = ${reserveHr}<br>` +
                   `3. 現在の心拍数 - 安静時： ${currentActiveHr} - ${currentRestHr} = ${activeDiff}<br>` +
                   `4. 計算： (${activeDiff} ÷ ${reserveHr}) × 100 = ${((activeDiff / reserveHr) * 100).toFixed(1)} ％<br>` +
                   `5. 四捨五入して <strong>${correctAns} ％</strong></div>`;
        }

        const unit = currentMode === 1 ? "拍/分" : "％";
        if (userAns === correctAns) {
            resultBox.innerHTML = `⭕ 正解です！<br>` + exp;
            resultBox.className = "result correct";
        } else {
            resultBox.innerHTML = `❌ 不正解...（正解は ${correctAns} ${unit}）<br>` + exp;
            resultBox.className = "result incorrect";
        }
        resultBox.style.display = "block";
    }
</script>

</body>
</html>
